name: Java CI with Gradle

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5

    - name: Make gradle wrapper executable
      run: chmod +x gradlew

    - name: Build and Test with Gradle
      run: ./gradlew build

    - name: Generate Job Summary
      if: always()
      run: |
        echo "### 빌드 작업 요약 (Job Summary)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| 항목 | 상세 정보 |" >> $GITHUB_STEP_SUMMARY
        echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
        echo "| **워크플로우** | ${{ github.workflow }} |" >> $GITHUB_STEP_SUMMARY
        echo "| **트리거 이벤트** | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| **대상 브랜치** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| **빌드 결과** | ${{ job.status == 'success' && '성공' || '실패' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| **테스트 여부** | 수행됨 |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "> **안내:** 모의 테스트 환경 및 Mock 설정을 적용하여 외부 의존성(대용량 ONNX 모델 및 Firebase Key)이 없는 CI 빌드 환경에서도 테스트 전체가 성공적으로 수행되었습니다." >> $GITHUB_STEP_SUMMARY




